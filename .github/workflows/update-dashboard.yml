name: Update Help Desk Dashboard

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6:00 AM UTC (2:00 AM ET)
  workflow_dispatch:        # Manual trigger from GitHub UI

permissions:
  contents: write           # Allows the Action to commit and push

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install axios

      - name: Generate dashboard
        env:
          FRESHSERVICE_API_KEY: ${{ secrets.FRESHSERVICE_API_KEY }}
          FRESHSERVICE_DOMAIN: support.patriotgis.com
        run: node generate-dashboard.js

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-update dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
